            // ---------- MULTI-ALGORITHM PREDICTION ENGINE ----------
            function runAlgorithms(seq) {
                const results = [];
                if (seq.length < 3) return [];

                // 1. Ultra-max (original)
                const ultra = ultraPredict(seq);
                results.push({ bias: ultra.prediction, weight: 1.5 });

                // 2. Momentum (last6)
                if (seq.length >= 6) {
                    const last6 = seq.slice(-6);
                    const big6 = last6.filter(s => s === 'B').length;
                    if (big6 >= 5) results.push({ bias: 'B', weight: 1.2 });
                    else if (big6 <= 1) results.push({ bias: 'S', weight: 1.2 });
                }

                // 3. Ratio pressure
                const bigCnt = seq.filter(s => s === 'B').length;
                const smallCnt = seq.filter(s => s === 'S').length;
                if (bigCnt >= 8) results.push({ bias: 'S', weight: 1.3 });
                else if (smallCnt >= 8) results.push({ bias: 'B', weight: 1.3 });

                // 4. Recent bias
                if (seq.length >= 10) {
                    const first5 = seq.slice(0,5);
                    const last5 = seq.slice(-5);
                    const bigFirst = first5.filter(s => s === 'B').length;
                    const bigLast = last5.filter(s => s === 'B').length;
                    if (bigLast > bigFirst) results.push({ bias: 'B', weight: 1.0 });
                    else if (bigLast < bigFirst) results.push({ bias: 'S', weight: 1.0 });
                }

                // 5. Cluster break
                let streak = 1;
                for (let i = seq.length-1; i > 0; i--) {
                    if (seq[i] === seq[i-1]) streak++; else break;
                }
                if (streak >= 3) {
                    const bias = seq[seq.length-1] === 'B' ? 'S' : 'B';
                    results.push({ bias: bias, weight: 1.2 });
                }

                // 6. Equalization
                if (Math.abs(bigCnt - smallCnt) >= 4) {
                    const bias = bigCnt > smallCnt ? 'S' : 'B';
                    results.push({ bias: bias, weight: 1.1 });
                }

                // 7. Alternation
                if (seq.length >= 5) {
                    const last5 = seq.slice(-5).join('');
                    if (last5 === 'BSBSB' || last5 === 'SBSBS') {
                        results.push({ bias: last5 === 'BSBSB' ? 'B' : 'S', weight: 1.1 });
                    }
                }

                // 8. Simple trend
                if (seq.length >= 3) {
                    const last3 = seq.slice(-3);
                    if (last3[0] === last3[1] && last3[1] === last3[2]) {
                        const bias = last3[0] === 'B' ? 'S' : 'B';
                        results.push({ bias: bias, weight: 1.0 });
                    } else if (last3[0] !== last3[1] && last3[1] !== last3[2]) {
                        results.push({ bias: last3[2], weight: 0.8 });
                    }
                }

                return results;
            }

            function ultraPredict(results) {
                let last2 = results.slice(-2).join("");
                let last3 = results.slice(-3).join("");
                let last4 = results.slice(-4).join("");
                let last5 = results.slice(-5).join("");
                let countB = results.filter(r=>"B"===r).length;
                let countS = results.filter(r=>"S"===r).length;

                let scoreB=0, scoreS=0;

                if(last3==="BBB") scoreS+=5; if(last3==="SSS") scoreB+=5;
                if(last4==="BBBB") scoreS+=5; if(last4==="SSSS") scoreB+=5;
                if(last5==="BBBBB") scoreS+=5; if(last5==="SSSSS") scoreB+=5;

                if(countB>countS) scoreS+=3; if(countS>countB) scoreB+=3;
                if(countB>=8) scoreS+=5; if(countS>=8) scoreB+=5;

                if(last2==="BB") scoreS+=2; if(last2==="SS") scoreB+=2;
                if(last3==="BBS") scoreS+=2; if(last3==="SSB") scoreB+=2;

                if(last5==="BSBSB") scoreS+=2; if(last5==="SBSBS") scoreB+=2;
                if(last4==="BSBS") scoreS+=1; if(last4==="SBSB") scoreB+=1;

                if(last3==="BSB" && countB>countS) scoreS+=1;
                if(last3==="SBS" && countS>countB) scoreB+=1;
                if(last5==="BSSBS" && countB>=3) scoreS+=1;
                if(last5==="SBSBB" && countS>=3) scoreB+=1;

                let prediction, confidence;
                if(scoreB>scoreS){ 
                    prediction="B"; 
                    confidence=Math.min(95, Math.floor(scoreB/(scoreB+scoreS)*100)); 
                }
                else if(scoreS>scoreB){ 
                    prediction="S"; 
                    confidence=Math.min(95, Math.floor(scoreS/(scoreB+scoreS)*100)); 
                }
                else { 
                    prediction=Math.random()>0.5?"B":"S"; 
                    confidence=50; 
                }
                return {prediction, confidence};
            }

            function combineAlgorithms(seq) {
                const algos = runAlgorithms(seq);
                let scoreB = 0, scoreS = 0;
                algos.forEach(a => {
                    if (a.bias === 'B') scoreB += a.weight;
                    else scoreS += a.weight;
                });
                let totalScore = scoreB + scoreS;
                if (totalScore === 0) {
                    const ultra = ultraPredict(seq);
                    return { prediction: ultra.prediction, confidence: ultra.confidence, algos };
                }
                const confidence = Math.round((Math.max(scoreB, scoreS) / totalScore) * 100);
                const prediction = scoreB > scoreS ? 'B' : (scoreS > scoreB ? 'S' : (Math.random() > 0.5 ? 'B' : 'S'));
                return { prediction, confidence, algos };

                        const li = document.createElement('li');
                        const algoName = `Algo ${idx+1}`;
                        li.innerHTML = `<span>${algoName}</span> <span class="pattern-bias">${a.bias === 'B' ? 'BIG' : 'SMALL'}</span>`;
                        if (a.bias === combined.prediction) li.classList.add('active');
                        patternUl.appendChild(li);
                    });
                } else {
                    patternUl.innerHTML = '<li>no strong patterns</li>';
                }

                const badge = document.getElementById('floatBadge');
                if (badge) {
                    badge.innerText = `⚡ ${predText}`;
                    badge.className = `prediction-float badge-${combined.prediction === 'B' ? 'big' : 'small'}`;
                }
            }

            async function fetchResults() {
                try {
                    const res = await fetch(apiUrl, {
                        method: "POST",
                        headers: headers,
                        body: JSON.stringify(requestData)
                    });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const json = await res.json();
                    updateUI(json);

                    const now = new Date();
                    const sec = now.getSeconds();
                    const delay = (30 - (sec % 30)) * 1000;
                    setTimeout(() => {
                        fetchResults();
                        setInterval(fetchResults, 30000);
                    }, delay);
                } catch (err) {
                    console.warn("API error:", err);
                    document.getElementById("tableBody").innerHTML = '<tr><td colspan="4" class="error-message">⚠️ Cannot fetch data – VPN may be needed</td></tr>';
                    document.getElementById("apiStatus").innerText = 'connection failed · check VPN';
                    setTimeout(fetchResults, 10000);
                }
            }

            // Mode toggle
            const hackContent = document.getElementById('hackContent');
            const gameContent = document.getElementById('gameContent');
            const btnHack = document.getElementById('btnHack');
            const btnGame = document.getElementById('btnGame');

            function setHackMode() {
                btnHack.classList.add('active');
                btnGame.classList.remove('active');
                hackContent.classList.remove('hidden');
                gameContent.classList.add('hidden');
            }

            function setGameMode() {
                btnGame.classList.add('active');
                btnHack.classList.remove('active');
                hackContent.classList.add('hidden');
                gameContent.classList.remove('hidden');
            }

            btnHack.addEventListener('click', setHackMode);
            btnGame.addEventListener('click', setGameMode);

            fetchResults();
        })();
    </script>
